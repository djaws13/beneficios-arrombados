<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerador de Benefícios Arrombados</title>

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f3f2ef;
      --card: #ffffff;
      --border: #dce6f1;
      --blue: #0a66c2;
      --blue-dark: #004182;
      --blue-soft: #e8f3ff;
      --text: #1d2226;
      --muted: #5f6b7a;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 700px;
      width: 100%;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .topbar {
      height: 6px;
      background: linear-gradient(90deg, #0a66c2, #378fe9);
      margin: -32px -32px 24px -32px;
      border-radius: 16px 16px 0 0;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 36px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 16px;
    }

    input {
      width: 100%;
      padding: 16px;
      border-radius: 10px;
      border: 1px solid #cfd9e3;
      font-size: 16px;
      margin-bottom: 12px;
    }

    input:focus {
      border-color: var(--blue);
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 999px;
      border: none;
      background: var(--blue);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: var(--blue-dark);
    }

    .output {
      display: none;
      margin-top: 24px;
      padding: 20px;
      background: var(--blue-soft);
      border-radius: 12px;
    }

    .badge {
      font-weight: bold;
      color: var(--blue);
      margin-bottom: 10px;
    }

    .result {
      font-size: 20px;
      font-weight: bold;
    }

    .actions {
      margin-top: 15px;
      display: none;
      gap: 10px;
      flex-wrap: wrap;
    }

    .secondary {
      flex: 1;
      border: 1px solid var(--blue);
      background: white;
      color: var(--blue);
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="topbar"></div>

    <h1>Gerador de Benefícios Arrombados</h1>

    <p class="sub">
      Escreva um benefício corporativo. A gente traduz sem filtro.
    </p>

    <input id="input" placeholder="Ex: 1h de day off no aniversário" />
    <button onclick="gerar()">Gerar</button>

    <div class="output" id="output">
      <div class="badge" id="badge"></div>
      <div class="result" id="result"></div>

      <div class="actions" id="actions">
        <button class="secondary" onclick="copiar()">Copiar</button>
        <button class="secondary" onclick="linkedin()">Postar no LinkedIn</button>
      </div>
    </div>
  </div>

  <script>
    const respostas = [
      "Isso aqui é só exploração com filtro de LinkedIn.",
      "A empresa não quis gastar, então criou narrativa.",
      "Você continua sobrecarregado, mas agora com ilusão de cuidado.",
      "Isso aqui é o mínimo vendido como diferencial.",
      "A empresa economiza, você agradece.",
      "Isso aqui é só pra não precisar aumentar salário.",
      "Benefício que só existe no PPT do RH.",
      "Isso resolve mais a empresa do que você.",
      "A empresa finge que se importa.",
      "Menos custo, mais discurso.",
      "Você ganha isso pra não perceber o resto.",
      "Isso aqui é um tapa nas costas com nome bonito.",
      "Não muda nada, só a narrativa.",
      "Um benefício pensado pra empresa, não pra você.",
      "Isso aqui é só pra ninguém reclamar.",
      "A empresa entrega pouco e chama de experiência.",
      "Você continua ferrado, mas com branding.",
      "Isso aqui é só um jeito educado de não resolver o problema.",
      "A empresa chama de cultura, você sente na terapia.",
      "Isso aqui é só contenção de danos."
    ];

    let textoFinal = "";

    function gerar() {
      const input = document.getElementById("input").value;

      if (!input) {
        alert("Digite algo.");
        return;
      }

      const random = respostas[Math.floor(Math.random() * respostas.length)];

      textoFinal = `${input}\n\n👉 ${random}`;

      document.getElementById("output").style.display = "block";
      document.getElementById("actions").style.display = "flex";
      document.getElementById("badge").innerText = input;
      document.getElementById("result").innerText = random;
    }

    function copiar() {
      navigator.clipboard.writeText(textoFinal);
      alert("Copiado!");
    }

    function linkedin() {
      const url = "https://www.linkedin.com/feed/?shareActive=true&text=" + encodeURIComponent(textoFinal);
      window.open(url, "_blank");
    }
  </script>

</body>
</html>
