<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tradutor de Benefícios Arrombados</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f3f3f5;
  color: #111;
}

.topbar {
  height: 60px;
  background: #fff;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
}

.brand-icon {
  width: 36px;
  height: 36px;
  background: #0a66c2;
  border-radius: 10px;
  display: grid;
  place-items: center;
  color: white;
}

.top-action {
  cursor: pointer;
  color: #666;
  font-size: 14px;
}

.page {
  max-width: 800px;
  margin: 0 auto;
  padding: 50px 20px;
}

h1 {
  text-align: center;
  font-size: 44px;
  margin: 0;
}

.sub {
  text-align: center;
  color: #666;
  margin-top: 10px;
  line-height: 1.4;
}

.card {
  margin-top: 30px;
  background: white;
  padding: 24px;
  border-radius: 20px;
  border: 1px solid #e5e7eb;
}

.label {
  font-size: 13px;
  font-weight: 700;
  color: #777;
  margin-bottom: 10px;
}

input {
  width: 100%;
  height: 52px;
  border-radius: 12px;
  border: 1px solid #ccc;
  padding: 0 16px;
  font-size: 16px;
  outline: none;
}

button.primary {
  width: 100%;
  margin-top: 12px;
  height: 48px;
  border-radius: 999px;
  border: none;
  background: #0a66c2;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.result {
  display: none;
  margin-top: 20px;
  background: white;
  padding: 24px;
  border-radius: 20px;
  border: 1px solid #e5e7eb;
}

.result-label {
  font-size: 12px;
  color: #0a66c2;
  font-weight: bold;
  margin-bottom: 10px;
}

.result-text {
  font-size: 28px;
  font-weight: 800;
  line-height: 1.3;
}

.result-text.typing::after {
  content: "|";
  margin-left: 4px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

.actions {
  display: none;
  margin-top: 12px;
  gap: 10px;
  flex-wrap: wrap;
}

.secondary {
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}

.examples {
  margin-top: 40px;
  text-align: center;
}

.chips {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.chip {
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
  font-size: 14px;
}

</style>
</head>

<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-icon">🎁</div>
    Tradutor de Benefícios Arrombados
  </div>
  <div class="top-action" onclick="compartilhar()">Compartilhar</div>
</div>

<div class="page">

  <h1>Tradutor de benefícios arrombados</h1>

  <div class="sub">
    Escreva um benefício corporativo.<br>
    A gente traduz sem filtro.
  </div>

  <div class="card">
    <div class="label">BENEFÍCIO CORPORATIVO</div>
    <input id="input" placeholder="Ex: Happy hour mensal">
    <button class="primary" onclick="gerar()">Gerar</button>
  </div>

  <div class="result" id="result">
    <div class="result-label">TRADUÇÃO REAL</div>
    <div class="result-text" id="resultText"></div>
  </div>

  <div class="actions" id="actions">
    <button class="secondary" onclick="copiar()">Copiar</button>
    <button class="secondary" onclick="linkedin()">LinkedIn</button>
    <button class="secondary" onclick="gerarOutra()">Outra</button>
  </div>

  <div class="examples">
    <div class="label">EXPERIMENTE COM EXEMPLOS</div>
    <div class="chips" id="chips"></div>
  </div>

</div>

<script>
const respostas = [
  "Menos custo, mais discurso.",
  "A empresa economiza, você agradece.",
  "Isso aqui é só maquiagem corporativa.",
  "Isso aqui não resolve nada.",
  "Você continua ferrado, mas com branding.",
  "Isso aqui é só narrativa.",
  "Migalha com storytelling.",
  "A empresa finge que se importa."
];

const exemplos = [
  "Happy hour mensal",
  "1h de day off no aniversário",
  "Fruta no escritório",
  "Dress code flexível",
  "Massagem mensal",
  "Short friday no verão",
  "Cerveja no fim do expediente",
  "Sala de descompressão"
];

let ultimoInput = "";
let textoFinal = "";

function sortear() {
  return respostas[Math.floor(Math.random() * respostas.length)];
}

function typeText(el, text) {
  el.innerText = "";
  el.classList.add("typing");

  let i = 0;

  function t() {
    if (i < text.length) {
      el.innerText += text[i];
      i++;
      setTimeout(t, 15);
    } else {
      el.classList.remove("typing");
    }
  }

  t();
}

function gerar() {
  const input = document.getElementById("input").value.trim();
  if (!input) return;

  ultimoInput = input;
  const resposta = sortear();

  textoFinal = `${input} 🟰 ${resposta}`;

  document.getElementById("result").style.display = "block";
  document.getElementById("actions").style.display = "flex";

  typeText(document.getElementById("resultText"), resposta);
}

function gerarOutra() {
  if (!ultimoInput) return;
  const resposta = sortear();
  textoFinal = `${ultimoInput} 🟰 ${resposta}`;
  typeText(document.getElementById("resultText"), resposta);
}

function usar(txt) {
  document.getElementById("input").value = txt;
  gerar();
}

function copiar() {
  navigator.clipboard.writeText(textoFinal);
  alert("Copiado");
}

function linkedin() {
  window.open("https://www.linkedin.com/feed/?shareActive=true&text=" + encodeURIComponent(textoFinal));
}

function compartilhar() {
  navigator.clipboard.writeText(window.location.href);
  alert("Link copiado");
}

function renderExemplos() {
  const container = document.getElementById("chips");

  exemplos.forEach(texto => {
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.innerText = texto;
    chip.onclick = () => usar(texto);
    container.appendChild(chip);
  });
}

renderExemplos();
</script>

</body>
</html>
