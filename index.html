<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradutor de Benefícios Arrombados</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --border: #d9dde3;
      --text: #111827;
      --muted: #6b7280;
      --blue: #0a66c2;
      --blue-dark: #004182;
      --shadow: 0 2px 8px rgba(15, 23, 42, 0.06), 0 12px 28px rgba(15, 23, 42, 0.04);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 999px;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .topbar {
      width: 100%;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e5e7eb;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 16px;
    }

    .brand-badge {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: var(--blue);
      color: white;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(10, 102, 194, 0.22);
    }

    .share-top {
      color: #4b5563;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 56px 20px 72px;
    }

    .hero {
      text-align: center;
      margin-bottom: 34px;
    }

    h1 {
      margin: 0;
      font-size: 52px;
      line-height: 1.04;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .sub {
      margin: 14px auto 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.35;
      max-width: 500px;
    }

    .card {
      max-width: 720px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .label {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #6b7280;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .input-wrap {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    input {
      width: 100%;
      height: 58px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #fff;
      padding: 0 18px;
      font-size: 18px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
    }

    input:focus {
      border-color: #9ac7f1;
      box-shadow: 0 0 0 4px rgba(10, 102, 194, 0.10);
    }

    input::placeholder {
      color: #9ca3af;
    }

    .primary-btn {
      height: 52px;
      border: none;
      border-radius: 999px;
      background: var(--blue);
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      box-shadow: 0 8px 20px rgba(10, 102, 194, 0.18);
    }

    .primary-btn:hover {
      background: var(--blue-dark);
    }

    .primary-btn:active {
      transform: translateY(1px);
    }

    .examples {
      text-align: center;
      margin-top: 38px;
    }

    .examples-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #6b7280;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      max-width: 760px;
      margin: 0 auto;
    }

    .chip {
      border: 1px solid #d1d5db;
      background: #fff;
      color: #4b5563;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      transition: all 0.18s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }

    .chip:hover {
      border-color: #b8d7f5;
      color: var(--blue);
      background: #f8fbff;
      transform: translateY(-1px);
    }

    .result-card {
      display: none;
      max-width: 720px;
      margin: 28px auto 0;
      background: linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
      border: 1px solid #d8e8f8;
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .result-label {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--blue);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .result-text {
      font-size: 28px;
      line-height: 1.28;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #111827;
      word-break: break-word;
    }

    .actions {
      display: none;
      max-width: 720px;
      margin: 14px auto 0;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .secondary-btn {
      height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid #cdd6e0;
      background: white;
      color: #374151;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .secondary-btn:hover {
      border-color: #b8d7f5;
      color: var(--blue);
      background: #f8fbff;
    }

    .feedback {
      text-align: center;
      margin-top: 10px;
      color: var(--blue);
      font-size: 14px;
      font-weight: 700;
      display: none;
    }

    @media (max-width: 720px) {
      .topbar {
        padding: 0 16px;
      }

      .brand span:last-child {
        font-size: 14px;
      }

      .share-top {
        font-size: 14px;
      }

      .page {
        padding-top: 34px;
      }

      h1 {
        font-size: 38px;
      }

      .sub {
        font-size: 17px;
      }

      .card,
      .result-card {
        padding: 20px;
        border-radius: 20px;
      }

      .result-text {
        font-size: 24px;
      }

      .chip {
        font-size: 15px;
        padding: 11px 16px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-badge">🎁</div>
      <span>Tradutor de Benefícios Arrombados</span>
    </div>
    <div class="share-top">🔗 Compartilhar</div>
  </header>

  <main class="page">
    <section class="hero">
      <h1>Tradutor de benefícios arrombados</h1>
      <p class="sub">
        Escreva um benefício corporativo.<br />
        A gente traduz sem filtro.
      </p>
    </section>

    <section class="card">
      <div class="label">Texto humano</div>

      <div class="input-wrap">
        <input
          id="input"
          type="text"
          placeholder="Ex: 1h de day off no aniversário"
          onkeydown="if(event.key === 'Enter') gerar()"
        />
        <button class="primary-btn" onclick="gerar()">Gerar</button>
      </div>
    </section>

    <section class="examples">
      <div class="examples-title">Experimente com exemplos</div>

      <div class="chips">
        <button class="chip" onclick="usarExemplo('Happy hour mensal')">Happy hour mensal</button>
        <button class="chip" onclick="usarExemplo('1h de day off no aniversário')">1h de day off no aniversário</button>
        <button class="chip" onclick="usarExemplo('Fruta no escritório')">Fruta no escritório</button>
        <button class="chip" onclick="usarExemplo('Dress code flexível')">Dress code flexível</button>
        <button class="chip" onclick="usarExemplo('Massagem uma vez por mês')">Massagem uma vez por mês</button>
        <button class="chip" onclick="usarExemplo('Short friday no verão')">Short friday no verão</button>
        <button class="chip" onclick="usarExemplo('Cerveja no fim do expediente')">Cerveja no fim do expediente</button>
        <button class="chip" onclick="usarExemplo('Sala de descompressão')">Sala de descompressão</button>
      </div>
    </section>

    <section class="result-card" id="resultCard">
      <div class="result-label">Tradução real</div>
      <div class="result-text" id="resultText"></div>
    </section>

    <section class="actions" id="actions">
      <button class="secondary-btn" onclick="copiar()">Copiar texto</button>
      <button class="secondary-btn" onclick="linkedin()">Postar no LinkedIn</button>
      <button class="secondary-btn" onclick="gerarOutra()">Gerar outra versão</button>
    </section>

    <div class="feedback" id="feedback">Texto copiado.</div>
  </main>

  <script>
    const respostas = [
      "Menos custo, mais discurso.",
      "A empresa economiza, você agradece.",
      "Isso aqui é só maquiagem corporativa.",
      "Isso aqui é o mínimo vendido como diferencial.",
      "A empresa prefere mimo a resolver o básico.",
      "Você continua sobrecarregado, mas agora com embalagem bonita.",
      "Benefício de PowerPoint, não de vida real.",
      "Isso aqui existe mais no post do RH do que na prática.",
      "A empresa finge cuidado sem mexer no que importa.",
      "Isso aqui é só um jeito educado de não aumentar salário.",
      "Um agrado simbólico pra compensar problema estrutural.",
      "A empresa chama de cultura, você sente na terapia.",
      "Isso aqui é só contenção de danos com branding.",
      "A empresa entrega pouco e chama de experiência.",
      "Isso aqui resolve mais o branding deles do que a sua vida.",
      "Você continua ferrado, mas agora com storytelling.",
      "Isso aqui é migalha com redação publicitária.",
      "A empresa quis parecer moderna sem gastar de verdade.",
      "Isso aqui é só um curativo em cima do caos.",
      "A empresa chama de benefício. O boleto chama de piada."
    ];

    let textoFinal = "";
    let ultimoInput = "";

    function sortearResposta() {
      return respostas[Math.floor(Math.random() * respostas.length)];
    }

    function montarResultado(input, resposta) {
      return `${input} 🟰 ${resposta}`;
    }

    function gerar() {
      const input = document.getElementById("input").value.trim();

      if (!input) {
        esconderResultado();
        return;
      }

      ultimoInput = input;
      const resposta = sortearResposta();
      textoFinal = montarResultado(input, resposta);

      document.getElementById("resultText").innerText = textoFinal;
      document.getElementById("resultCard").style.display = "block";
      document.getElementById("actions").style.display = "flex";
      document.getElementById("feedback").style.display = "none";
    }

    function gerarOutra() {
      if (!ultimoInput) return;
      const resposta = sortearResposta();
      textoFinal = montarResultado(ultimoInput, resposta);
      document.getElementById("resultText").innerText = textoFinal;
      document.getElementById("feedback").style.display = "none";
    }

    function usarExemplo(texto) {
      document.getElementById("input").value = texto;
      gerar();
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function copiar() {
      if (!textoFinal) return;
      navigator.clipboard.writeText(textoFinal).then(() => {
        document.getElementById("feedback").style.display = "block";
      });
    }

    function linkedin() {
      if (!textoFinal) return;
      const url = "https://www.linkedin.com/feed/?shareActive=true&text=" + encodeURIComponent(textoFinal);
      window.open(url, "_blank");
    }

    function esconderResultado() {
      document.getElementById("resultCard").style.display = "none";
      document.getElementById("actions").style.display = "none";
      document.getElementById("feedback").style.display = "none";
      textoFinal = "";
      ultimoInput = "";
    }
  </script>
</body>
</html>
