<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerador de Benefícios Arrombados</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #f3f2ef;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 16px;
      max-width: 700px;
      width: 100%;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }

    .sub {
      color: #666;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 18px;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid #ccc;
      outline: none;
    }

    input:focus {
      border-color: #0a66c2;
      box-shadow: 0 0 0 3px rgba(10,102,194,0.15);
    }

    .output {
      margin-top: 24px;
      padding: 20px;
      background: #e8f3ff;
      border-radius: 12px;
      font-size: 22px;
      font-weight: bold;
      display: none;
    }

    .actions {
      margin-top: 12px;
      display: none;
      gap: 10px;
      flex-direction: column;
    }

    button {
      padding: 14px;
      border-radius: 999px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .secondary {
      background: white;
      border: 1px solid #0a66c2;
      color: #0a66c2;
    }

  </style>
</head>

<body>

  <div class="card">
    <h1>Gerador de Benefícios Arrombados</h1>

    <p class="sub">
      Cole um benefício corporativo. A gente traduz sem filtro.
    </p>

    <input
      id="input"
      placeholder="Ex: Happy hour mensal"
      oninput="gerar()"
    />

    <div class="output" id="output"></div>

    <div class="actions" id="actions">
      <button class="secondary" onclick="copiar()">Copiar</button>
      <button class="secondary" onclick="linkedin()">Postar no LinkedIn</button>
    </div>
  </div>

  <script>
    const respostas = [
      "Menos custo, mais discurso.",
      "A empresa economiza, você agradece.",
      "Isso aqui é só maquiagem corporativa.",
      "Isso aqui é só narrativa.",
      "Você continua ferrado, mas com branding.",
      "Isso aqui não resolve nada.",
      "Isso aqui é só pra não aumentar salário.",
      "A empresa finge que se importa.",
      "Isso aqui é só um agrado simbólico.",
      "Menos entrega, mais storytelling."
    ];

    let textoFinal = "";

    function gerar() {
      const input = document.getElementById("input").value.trim();

      if (!input) {
        document.getElementById("output").style.display = "none";
        document.getElementById("actions").style.display = "none";
        return;
      }

      const random = respostas[Math.floor(Math.random() * respostas.length)];

      textoFinal = `${input} 🟰 ${random}`;

      document.getElementById("output").style.display = "block";
      document.getElementById("actions").style.display = "flex";
      document.getElementById("output").innerText = textoFinal;
    }

    function copiar() {
      navigator.clipboard.writeText(textoFinal);
      alert("Copiado!");
    }

    function linkedin() {
      const url = "https://www.linkedin.com/feed/?shareActive=true&text=" + encodeURIComponent(textoFinal);
      window.open(url, "_blank");
    }
  </script>

</body>
</html>
